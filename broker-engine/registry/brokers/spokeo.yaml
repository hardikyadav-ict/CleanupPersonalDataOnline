metadata:
  id: "spokeo"
  name: "Spokeo"
  website: "https://www.spokeo.com"
  type: "public"
  jurisdiction: "US"
  category: "people_search"
  active: true

legal:
  law_basis: "CCPA"
  response_deadline_days: 45
  suppression_renewal_days: 90
  identity_verification: "email"

removal:
  method: "form"
  entry_url: "https://www.spokeo.com/optout"
  requires_captcha: true
  captcha_type: "recaptcha_v2"
  requires_account: false
  steps:
    - id: "navigate"
      action: "goto"
      url: "https://www.spokeo.com/optout"
      wait_until: "networkidle"
      timeout_ms: 30000
    - id: "enter_email"
      action: "fill"
      selector: "#email"
      value_ref: "{{user.email}}"
      description: "Enter user's email address"
    - id: "enter_first_name"
      action: "fill"
      selector: "input[name='firstName']"
      value_ref: "{{user.firstName}}"
    - id: "enter_last_name"
      action: "fill"
      selector: "input[name='lastName']"
      value_ref: "{{user.lastName}}"
    - id: "enter_city"
      action: "fill"
      selector: "[data-testid='city-input']"
      value_ref: "{{user.addresses.0.city}}"
    - id: "select_state"
      action: "select_option"
      selector: "select[name='state']"
      value_ref: "{{user.addresses.0.state}}"
    - id: "solve_captcha"
      action: "captcha"
      site_key_selector: "#recaptcha-site-key"
      captcha_type: "recaptcha_v2"
      inject_selector: "#g-recaptcha-response"
    - id: "submit"
      action: "click"
      selector: "button[type='submit']"
      wait_for_navigation: true
      screenshot_on_submit: true
  confirmation:
    type: "email"
    expected_subject_regex: "Opt-Out Confirmation|removal request"
    expected_sender_regex: "@spokeo\\.com"
    token_extraction:
      method: "llm_parse"
      regex: "https://[^/]+/optout/confirm/([a-zA-Z0-9_\\-\\.]+)"
    on_page_indicators:
      - "Your request has been submitted"
      - "Confirmation number:"
  error_detection:
    retryable_selectors:
      - "text=Please try again later"
      - "text=Rate limit exceeded"
    non_retryable_selectors:
      - "text=Email already in use"
    max_retries: 3
    retry_backoff_ms: [1000, 5000, 30000]

rate_limiting:
  max_requests_per_hour: 10
  min_delay_between_requests_ms: 60000
  cooldown_after_failure_minutes: 120

proxy:
  required: true
  preferred_country: "US"
  sticky_session: true
  avoid_datacenter: true

schedule:
  initial_removal: "immediate"
  recurring_interval_days: 90
  recurring_jitter_minutes: 1440
