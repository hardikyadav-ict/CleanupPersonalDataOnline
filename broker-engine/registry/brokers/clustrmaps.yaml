metadata:
  id: "clustrmaps"
  name: "ClustrMaps"
  website: "https://clustrmaps.com"
  type: "public"
  jurisdiction: "GLOBAL"
  category: "people_search"
  active: true

legal:
  law_basis: "GDPR"
  response_deadline_days: 30
  suppression_renewal_days: 90
  identity_verification: "email"

removal:
  method: "form"
  entry_url: "https://clustrmaps.com/pages/optout"
  requires_captcha: false
  requires_account: false
  steps:
    - id: "navigate"
      action: "goto"
      url: "https://clustrmaps.com/pages/optout"
      wait_until: "networkidle"
      timeout_ms: 30000
    - id: "enter_email"
      action: "fill"
      selector: "input[name='email']"
      value_ref: "{{user.email}}"
    - id: "enter_first_name"
      action: "fill"
      selector: "input[name='firstname']"
      value_ref: "{{user.firstName}}"
    - id: "enter_last_name"
      action: "fill"
      selector: "input[name='lastname']"
      value_ref: "{{user.lastName}}"
    - id: "enter_url"
      action: "fill"
      selector: "input[name='profile_url']"
      value: "https://clustrmaps.com/person/{{user.firstName}}-{{user.lastName}}"
    - id: "submit"
      action: "click"
      selector: "button[type='submit']"
      wait_for_navigation: true
      screenshot_on_submit: true
  confirmation:
    type: "email"
    expected_subject_regex: "Opt-Out Confirmation|ClustrMaps"
    expected_sender_regex: "@clustrmaps\\.com"
    on_page_indicators:
      - "Your opt-out request has been submitted"
  error_detection:
    retryable_selectors:
      - "text=try again"
    non_retryable_selectors: []
    max_retries: 3
    retry_backoff_ms: [2000, 10000, 60000]

rate_limiting:
  max_requests_per_hour: 30
  min_delay_between_requests_ms: 20000
  cooldown_after_failure_minutes: 30

proxy:
  required: false
  preferred_country: "US"
  sticky_session: false
  avoid_datacenter: false

schedule:
  initial_removal: "immediate"
  recurring_interval_days: 90
  recurring_jitter_minutes: 1440
