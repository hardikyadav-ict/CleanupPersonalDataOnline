services:
  - type: web
    name: privacyshield
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_URL
        fromService:
          name: privacyshield
          type: web
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: DATABASE_URL
        fromDatabase:
          name: privacyshield-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: privacyshield-redis
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CAPTCHA_API_KEY
        sync: false

  - type: keyvalue
    name: privacyshield-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    persistenceMode: off
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow-all

databases:
  - name: privacyshield-db
    plan: free
    databaseName: privacyshield
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow-all
